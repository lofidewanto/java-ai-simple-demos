<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Workflow Definitions — Workflow Engine</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"/>
  <style>
    body { padding-top: 60px; }
    .navbar-brand { font-weight: 700; }
    #error-banner { display: none; }
  </style>
</head>
<body>

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container mt-4">
  <div th:replace="~{layout :: error-banner}"></div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 class="h3">Workflow Definitions</h1>
    <button class="btn btn-outline-secondary btn-sm" onclick="loadDefinitions()">&#8635; Refresh</button>
  </div>

  <div id="definitions-container">
    <div class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading…</span>
      </div>
    </div>
  </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>

<th:block th:replace="~{layout :: scripts}"></th:block>

<script>
  async function loadDefinitions() {
    const container = document.getElementById('definitions-container');
    container.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading…</span></div></div>';
    try {
      const res = await fetch('/api/workflow-definitions');
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const defs = await res.json();
      if (defs.length === 0) {
        container.innerHTML = '<p class="text-muted">No workflow definitions found.</p>';
        return;
      }
      container.innerHTML = defs.map(d => renderCard(d)).join('');
    } catch (e) {
      showError('Failed to load workflow definitions: ' + e.message);
      container.innerHTML = '';
    }
  }

  function renderCard(d) {
    const stateCount = d.states ? d.states.length : 0;
    const transCount = d.transitions ? d.transitions.length : 0;
    const safeId = d.name.replace(/[^a-z0-9]/gi, '_');

    const statesHtml = d.states ? d.states.map(s => `
      <span class="badge text-bg-secondary me-1">
        ${escHtml(s.name)}
        ${s.initial ? '<span class="badge text-bg-success ms-1">initial</span>' : ''}
        ${s.terminal ? '<span class="badge text-bg-danger ms-1">terminal</span>' : ''}
      </span>`).join('') : '';

    const transHtml = d.transitions ? d.transitions.map(t => `
      <tr>
        <td>${escHtml(t.from)}</td>
        <td>${escHtml(t.action)}</td>
        <td>${escHtml(t.to)}</td>
        <td><span class="badge text-bg-info">${escHtml(t.taskType || 'HUMAN')}</span></td>
        <td class="text-muted small">${escHtml(t.description || '')}</td>
      </tr>`).join('') : '';

    return `
    <div class="card mb-3">
      <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <div>
          <strong>${escHtml(d.name)}</strong>
          ${d.description ? `<span class="text-muted ms-2 small">${escHtml(d.description)}</span>` : ''}
        </div>
        <div class="d-flex gap-2 align-items-center flex-wrap">
          <span class="badge text-bg-primary">${stateCount} states</span>
          <span class="badge text-bg-secondary">${transCount} transitions</span>
          <button class="btn btn-success btn-sm" onclick="startInstance('${escHtml(d.name)}')">&#9654; Start Instance</button>
          <button class="btn btn-outline-secondary btn-sm"
                  data-bs-toggle="collapse"
                  data-bs-target="#details-${safeId}">Details</button>
        </div>
      </div>
      <div class="collapse" id="details-${safeId}">
        <div class="card-body">
          <h6>States</h6>
          <p>${statesHtml || '<em class="text-muted">None</em>'}</p>
          <h6>Transitions</h6>
          ${transHtml ? `
          <div class="table-responsive">
            <table class="table table-sm table-bordered">
              <thead><tr><th>From</th><th>Action</th><th>To</th><th>Type</th><th>Description</th></tr></thead>
              <tbody>${transHtml}</tbody>
            </table>
          </div>` : '<em class="text-muted">None</em>'}
        </div>
      </div>
    </div>`;
  }

  async function startInstance(workflowName) {
    try {
      const res = await fetch('/api/workflow-instances', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({workflowName})
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || 'HTTP ' + res.status);
      }
      const instance = await res.json();
      window.location.href = '/ui/instances/' + instance.id;
    } catch (e) {
      showError('Failed to start instance: ' + e.message);
    }
  }

  function escHtml(str) {
    if (str == null) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadDefinitions();
</script>
</body>
</html>
