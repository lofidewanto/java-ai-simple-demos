<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<!--
  Shared layout fragments. Each page template includes these via th:replace.
  Usage:
    <nav th:replace="~{layout :: navbar}"></nav>
    <div th:replace="~{layout :: error-banner}"></div>
    <footer th:replace="~{layout :: footer}"></footer>
    <th:block th:replace="~{layout :: scripts}"></th:block>
-->
<head>
  <title>Layout</title>
</head>
<body>

  <!-- ── navbar ──────────────────────────────────────────────────── -->
  <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container-fluid">
      <a class="navbar-brand" th:href="@{/ui/workflows}">Workflow Engine</a>
      <button class="navbar-toggler" type="button"
              data-bs-toggle="collapse" data-bs-target="#navMenu"
              aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMenu">
        <ul class="navbar-nav me-auto">
          <li class="nav-item">
            <a class="nav-link" th:href="@{/ui/workflows}">Workflow Definitions</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" th:href="@{/ui/instances}">Instances</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ── error banner ────────────────────────────────────────────── -->
  <div th:fragment="error-banner"
       id="error-banner" class="alert alert-danger alert-dismissible mx-3 mt-2" role="alert">
    <strong>Error:</strong> <span id="error-msg"></span>
    <button type="button" class="btn-close"
            onclick="document.getElementById('error-banner').style.display='none'"></button>
  </div>

  <!-- ── footer ──────────────────────────────────────────────────── -->
  <footer th:fragment="footer" class="bg-light text-center text-muted py-3 mt-5 border-top">
    <small>Workflow Engine UI &mdash; Spring Boot + Thymeleaf + Bootstrap 5</small>
  </footer>

  <!-- ── scripts (Bootstrap JS + showError helper) ───────────────── -->
  <th:block th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>
    <script>
      function showError(msg) {
        document.getElementById('error-msg').textContent = msg;
        document.getElementById('error-banner').style.display = 'block';
        window.scrollTo(0, 0);
      }
    </script>
  </th:block>

</body>
</html>
