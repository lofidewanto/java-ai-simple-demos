<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Workflow Instances — Workflow Engine</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"/>
  <style>
    body { padding-top: 60px; }
    .navbar-brand { font-weight: 700; }
    #error-banner { display: none; }
  </style>
</head>
<body>

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container mt-4">
  <div th:replace="~{layout :: error-banner}"></div>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3">Workflow Instances</h1>
    <button class="btn btn-outline-secondary btn-sm" onclick="loadInstances()">&#8635; Refresh</button>
  </div>

  <div class="row g-2 mb-3 align-items-end">
    <div class="col-auto">
      <label for="filter-select" class="form-label mb-0 small text-muted">Filter by workflow</label>
      <select id="filter-select" class="form-select form-select-sm" onchange="loadInstances()">
        <option value="">All workflows</option>
      </select>
    </div>
  </div>

  <div id="instances-container">
    <div class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading…</span>
      </div>
    </div>
  </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>

<th:block th:replace="~{layout :: scripts}"></th:block>

<script>
  async function loadDefinitionsFilter() {
    try {
      const res = await fetch('/api/workflow-definitions');
      if (!res.ok) return;
      const defs = await res.json();
      const sel = document.getElementById('filter-select');
      const current = sel.value;
      while (sel.options.length > 1) sel.remove(1);
      defs.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.name;
        opt.textContent = d.name;
        if (d.name === current) opt.selected = true;
        sel.appendChild(opt);
      });
    } catch (_) {}
  }

  async function loadInstances() {
    const container = document.getElementById('instances-container');
    container.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading…</span></div></div>';
    const wfName = document.getElementById('filter-select').value;
    const url = wfName ? '/api/workflow-instances?workflowName=' + encodeURIComponent(wfName) : '/api/workflow-instances';
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const instances = await res.json();
      if (instances.length === 0) {
        container.innerHTML = '<p class="text-muted">No instances found.</p>';
        return;
      }
      container.innerHTML = `
      <div class="table-responsive">
        <table class="table table-hover table-bordered align-middle">
          <thead class="table-light">
            <tr>
              <th>ID</th><th>Workflow Name</th><th>Current State</th>
              <th>Status</th><th>Created</th><th>Updated</th><th></th>
            </tr>
          </thead>
          <tbody>${instances.map(i => renderRow(i)).join('')}</tbody>
        </table>
      </div>`;
    } catch (e) {
      showError('Failed to load instances: ' + e.message);
      container.innerHTML = '';
    }
  }

  function renderRow(i) {
    return `
    <tr>
      <td>${escHtml(String(i.id))}</td>
      <td>${escHtml(i.workflowName)}</td>
      <td><code>${escHtml(i.currentState)}</code></td>
      <td>${statusBadge(i.status)}</td>
      <td><small>${formatDate(i.createdAt)}</small></td>
      <td><small>${formatDate(i.updatedAt)}</small></td>
      <td><a href="/ui/instances/${escHtml(String(i.id))}" class="btn btn-sm btn-outline-primary">View</a></td>
    </tr>`;
  }

  function statusBadge(status) {
    const cls = status === 'RUNNING'   ? 'success'
              : status === 'PAUSED'    ? 'warning text-dark'
              : status === 'COMPLETED' ? 'secondary'
              : 'light text-dark';
    return `<span class="badge text-bg-${cls}">${escHtml(status)}</span>`;
  }

  function formatDate(val) {
    if (!val) return '—';
    try { return new Date(val).toLocaleString(); } catch (_) { return val; }
  }

  function escHtml(str) {
    if (str == null) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadDefinitionsFilter().then(() => loadInstances());
</script>
</body>
</html>
