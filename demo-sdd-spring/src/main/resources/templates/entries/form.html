<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${isEdit ? 'Edit Entry' : 'Add Entry'}">Guest Book Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">Guest Book</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0" th:text="${isEdit ? 'Edit Entry' : 'Add New Entry'}">Form Title</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="${isEdit ? '/entries/' + entry.id : '/entries'}" 
                              th:object="${entry}" 
                              method="post">
                            
                            <!-- Name Field -->
                            <div class="mb-3">
                                <label for="name" class="form-label">Name <span class="text-danger">*</span></label>
                                <input type="text" 
                                       class="form-control" 
                                       id="name" 
                                       th:field="*{name}" 
                                       placeholder="Enter your name"
                                       required>
                            </div>

                            <!-- Email Field -->
                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" 
                                       class="form-control" 
                                       id="email" 
                                       th:field="*{email}" 
                                       placeholder="your.email@example.com">
                                <div class="form-text">Optional - your email will be visible to others</div>
                            </div>

                            <!-- Message Field -->
                            <div class="mb-3">
                                <label for="message" class="form-label">Message <span class="text-danger">*</span></label>
                                <textarea class="form-control" 
                                          id="message" 
                                          th:field="*{message}" 
                                          rows="5" 
                                          placeholder="Share your thoughts..."
                                          required></textarea>
                            </div>

                            <!-- Buttons -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/entries" class="btn btn-secondary">Cancel</a>
                                <button type="submit" class="btn btn-primary" th:text="${isEdit ? 'Update Entry' : 'Add Entry'}">Submit</button>
                            </div>
                        </form>
                    </div>
                </div>

                <!-- Help Text -->
                <div class="mt-3">
                    <p class="text-muted">
                        <small><span class="text-danger">*</span> Required fields</small>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <footer class="mt-5 py-3 bg-light">
        <div class="container text-center">
            <p class="text-muted mb-0">Guest Book Spring Boot Demo</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
