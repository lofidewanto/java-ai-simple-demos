<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Instance Detail — Workflow Engine</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"/>
  <style>
    body { padding-top: 60px; }
    .navbar-brand { font-weight: 700; }
    .timeline-item { border-left: 3px solid #dee2e6; padding-left: 1rem; margin-bottom: 1rem; }
    .timeline-item:last-child { border-left-color: #0d6efd; }
    #error-banner { display: none; }
  </style>
</head>
<body>

<nav th:replace="~{layout :: navbar}"></nav>

<div class="container mt-4">
  <div th:replace="~{layout :: error-banner}"></div>

  <div class="mb-3">
    <a href="/ui/instances" class="btn btn-outline-secondary btn-sm">&larr; Back to Instances</a>
  </div>

  <div id="detail-container">
    <div class="text-center py-5">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden">Loading…</span>
      </div>
    </div>
  </div>
</div>

<footer th:replace="~{layout :: footer}"></footer>

<th:block th:replace="~{layout :: scripts}"></th:block>

<script th:inline="javascript">
  /*<![CDATA[*/
  const INSTANCE_ID = /*[[${instanceId}]]*/ null;
  /*]]>*/

  async function loadDetail() {
    const container = document.getElementById('detail-container');
    try {
      const instRes = await fetch('/api/workflow-instances/' + INSTANCE_ID);
      if (!instRes.ok) throw new Error('HTTP ' + instRes.status);
      const inst = await instRes.json();

      const defRes = await fetch('/api/workflow-definitions/' + encodeURIComponent(inst.workflowName));
      const def = defRes.ok ? await defRes.json() : null;

      const available = def && def.transitions
        ? def.transitions.filter(t => t.from === inst.currentState)
        : [];

      container.innerHTML = renderDetail(inst, available);
    } catch (e) {
      showError('Failed to load instance: ' + e.message);
      container.innerHTML = '';
    }
  }

  function renderDetail(inst, available) {
    const historyHtml = inst.history && inst.history.length > 0
      ? inst.history.map(h => `
        <div class="timeline-item">
          <div class="d-flex justify-content-between flex-wrap gap-1">
            <span>
              <code>${escHtml(h.fromState || '—')}</code>
              &rarr;
              <code>${escHtml(h.toState)}</code>
              <span class="ms-2 fw-semibold">${escHtml(h.action)}</span>
              <span class="badge text-bg-info ms-1">${escHtml(h.taskType || '')}</span>
            </span>
            <small class="text-muted">${formatDate(h.occurredAt)}</small>
          </div>
        </div>`).join('')
      : '<p class="text-muted">No history entries.</p>';

    const transitionsHtml = available.length > 0
      ? available.map(t => `
        <button class="btn btn-primary btn-sm me-2 mb-2"
                onclick="triggerAction('${escHtml(t.action)}')">
          ${escHtml(t.action)}
          <span class="badge text-bg-light text-dark ms-1">${escHtml(t.taskType || 'HUMAN')}</span>
          &rarr; ${escHtml(t.to)}
        </button>`).join('')
      : '<span class="text-muted">No available transitions from current state.</span>';

    const pauseBtn  = inst.status === 'RUNNING' ? `<button class="btn btn-warning btn-sm me-2" onclick="pauseInstance()">&#9646;&#9646; Pause</button>` : '';
    const resumeBtn = inst.status === 'PAUSED'  ? `<button class="btn btn-success btn-sm me-2" onclick="resumeInstance()">&#9654; Resume</button>` : '';

    return `
    <div class="card mb-4">
      <div class="card-header d-flex justify-content-between align-items-center flex-wrap gap-2">
        <h2 class="h5 mb-0">Instance #${escHtml(String(inst.id))}</h2>
        ${statusBadge(inst.status)}
      </div>
      <div class="card-body">
        <dl class="row mb-0">
          <dt class="col-sm-3">Workflow</dt>
          <dd class="col-sm-9">${escHtml(inst.workflowName)}</dd>
          <dt class="col-sm-3">Current State</dt>
          <dd class="col-sm-9"><code>${escHtml(inst.currentState)}</code></dd>
          <dt class="col-sm-3">Created</dt>
          <dd class="col-sm-9">${formatDate(inst.createdAt)}</dd>
          <dt class="col-sm-3">Updated</dt>
          <dd class="col-sm-9">${formatDate(inst.updatedAt)}</dd>
        </dl>
      </div>
    </div>

    <div class="card mb-4">
      <div class="card-header"><strong>Actions</strong></div>
      <div class="card-body">
        ${pauseBtn}${resumeBtn}
        <div class="mt-2">
          <span class="me-2 fw-semibold small text-muted">TRIGGER TRANSITION:</span>
          ${transitionsHtml}
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><strong>Execution History</strong></div>
      <div class="card-body">${historyHtml}</div>
    </div>`;
  }

  async function triggerAction(action) {
    try {
      const res = await fetch('/api/workflow-instances/' + INSTANCE_ID + '/transitions', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({action})
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || 'HTTP ' + res.status);
      }
      await loadDetail();
    } catch (e) {
      showError('Failed to trigger action: ' + e.message);
    }
  }

  async function pauseInstance() {
    try {
      const res = await fetch('/api/workflow-instances/' + INSTANCE_ID + '/pause', {method: 'POST'});
      if (!res.ok) throw new Error('HTTP ' + res.status);
      await loadDetail();
    } catch (e) {
      showError('Failed to pause instance: ' + e.message);
    }
  }

  async function resumeInstance() {
    try {
      const res = await fetch('/api/workflow-instances/' + INSTANCE_ID + '/resume', {method: 'POST'});
      if (!res.ok) throw new Error('HTTP ' + res.status);
      await loadDetail();
    } catch (e) {
      showError('Failed to resume instance: ' + e.message);
    }
  }

  function statusBadge(status) {
    const cls = status === 'RUNNING'   ? 'success'
              : status === 'PAUSED'    ? 'warning text-dark'
              : status === 'COMPLETED' ? 'secondary'
              : 'light text-dark';
    return `<span class="badge text-bg-${cls} fs-6">${escHtml(status)}</span>`;
  }

  function formatDate(val) {
    if (!val) return '—';
    try { return new Date(val).toLocaleString(); } catch (_) { return val; }
  }

  function escHtml(str) {
    if (str == null) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  loadDetail();
</script>
</body>
</html>
